<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MC Finance — Despesas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main>
        <div class="app-header">
            <div class="user-pill" id="btn-profile" title="Meu Perfil">
                <div class="user-avatar" id="user-avatar"></div>
                <span id="user-greeting"></span>
                <i class="bi bi-chevron-down chevron"></i>
            </div>
            <button id="btn-logout" class="btn-logout"><i class="bi bi-box-arrow-right"></i> Sair</button>
        </div>

        <!-- Modal de Perfil -->
        <div id="profile-modal" class="modal-overlay" style="display:none">
            <div class="modal-card">
                <div class="modal-header">
                    <div class="modal-title-row">
                        <div class="modal-avatar" id="modal-avatar"></div>
                        <div>
                            <h2>Meu Perfil</h2>
                            <p class="modal-email" id="modal-email"></p>
                        </div>
                    </div>
                    <button id="modal-close" class="modal-close" title="Fechar">&times;</button>
                </div>

                <div id="profile-msg" class="profile-msg" style="display:none"></div>

                <!-- Aba de navegação -->
                <div class="profile-tabs">
                    <button class="profile-tab active" data-tab="tab-info">Dados</button>
                    <button class="profile-tab" data-tab="tab-password">Senha</button>
                    <button class="profile-tab" data-tab="tab-danger">Excluir Conta</button>
                </div>

                <!-- Tab: Dados -->
                <div id="tab-info" class="tab-content active">
                    <form id="form-profile" autocomplete="off">
                        <div class="form-group">
                            <label for="profile-name">Nome</label>
                            <input type="text" id="profile-name" />
                        </div>
                        <div class="form-group">
                            <label for="profile-email">Email</label>
                            <input type="email" id="profile-email" />
                        </div>
                        <button type="submit">Salvar Alterações</button>
                    </form>
                </div>

                <!-- Tab: Senha -->
                <div id="tab-password" class="tab-content">
                    <form id="form-password" autocomplete="off">
                        <div class="form-group">
                            <label for="current-password">Senha Atual</label>
                            <input type="password" id="current-password" />
                        </div>
                        <div class="form-group">
                            <label for="new-password">Nova Senha</label>
                            <input type="password" id="new-password" />
                        </div>
                        <p class="password-hint">Mínimo 8 caracteres, com maiúscula, minúscula, número e caractere especial.</p>
                        <button type="submit">Alterar Senha</button>
                    </form>
                </div>

                <!-- Tab: Excluir Conta -->
                <div id="tab-danger" class="tab-content">
                    <div class="danger-zone">
                        <p><strong>Atenção:</strong> Esta ação é irreversível. Todos os seus dados (despesas, configurações) serão excluídos permanentemente.</p>
                        <form id="form-delete" autocomplete="off">
                            <div class="form-group">
                                <label for="delete-password">Confirme sua senha</label>
                                <input type="password" id="delete-password" />
                            </div>
                            <button type="submit" class="btn-danger">Excluir Minha Conta</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <section class="card" aria-labelledby="calc-title">
            <h1 id="calc-title" class="visually-hidden txt-center">
                Formulário de Despesas Mensais
            </h1>

            <div class="card-body">
                <div class="form-group">
                    <label for="salario">Salário Base (Kz)</label>
                    <input type="number" id="salario" min="0" />
                </div>
                <div class="form-group">
                    <label for="currency">Moeda <span class="beta-tag">(BETA)</span></label>
                    <select id="currency" disabled>
                        <option value="">Escolha a moeda</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição da Despesa</label>
                    <input type="text" id="descricao" placeholder="Ex: Dízimo" />
                </div>
                <div class="form-group">
                    <label for="valor">Valor da Despesa (Kz)</label>
                    <input type="number" id="valor" placeholder="Ex: 10000" min="0" />
                </div>

                <button id="btn-adicionar" type="button">Adicionar Despesa</button>
            </div>

            <div class="table-wrapper">
                <table aria-label="Lista de Despesas">
                    <thead>
                        <tr>
                            <th class="txt-center">#</th>
                            <th class="txt-center">Descrição</th>
                            <th class="txt-center">Valor (Kz)</th>
                            <th class="txt-center">Percentagem</th>
                            <th class="txt-center action">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela"></tbody>
                    <tfoot id="resumo"></tfoot>
                </table>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
