<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — MC Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <section class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">MC Finance</h1>
            <p class="auth-subtitle">Calculadora de Despesas</p>

            <div id="auth-error" class="auth-error" style="display:none"></div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required />
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" placeholder="Sua senha" required />
                </div>
                <button type="submit">Entrar</button>
                <p class="auth-switch">
                    Não tem conta? <a href="register.html">Criar conta</a>
                </p>
            </form>
        </div>
    </section>

    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
