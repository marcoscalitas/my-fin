<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Conta — MC Finance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <section class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">MC Finance</h1>
            <p class="auth-subtitle">Criar nova conta</p>

            <div id="auth-error" class="auth-error" style="display:none"></div>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="reg-name">Nome</label>
                    <input type="text" id="reg-name" placeholder="Seu nome" required />
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="seu@email.com" required />
                </div>
                <div class="form-group">
                    <label for="reg-password">Senha</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required minlength="6" />
                </div>
                <button type="submit">Criar Conta</button>
                <p class="auth-switch">
                    Já tem conta? <a href="login.html">Fazer login</a>
                </p>
            </form>
        </div>
    </section>

    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
