<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Despesas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assests/css/style.css">
</head>

<body>
    <!-- AUTH SECTION -->
    <section id="auth-section" class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">My Fin</h1>
            <p class="auth-subtitle">Calculadora de Despesas</p>

            <div id="auth-error" class="auth-error" style="display:none"></div>

            <!-- LOGIN FORM -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required />
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" placeholder="Sua senha" required />
                </div>
                <button type="submit" id="btn-login">Entrar</button>
                <p class="auth-switch">
                    Não tem conta? <a href="#" id="show-register">Criar conta</a>
                </p>
            </form>

            <!-- REGISTER FORM -->
            <form id="register-form" class="auth-form" style="display:none">
                <div class="form-group">
                    <label for="reg-name">Nome</label>
                    <input type="text" id="reg-name" placeholder="Seu nome" required />
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="seu@email.com" required />
                </div>
                <div class="form-group">
                    <label for="reg-password">Senha</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required minlength="6" />
                </div>
                <button type="submit" id="btn-register">Criar Conta</button>
                <p class="auth-switch">
                    Já tem conta? <a href="#" id="show-login">Fazer login</a>
                </p>
            </form>
        </div>
    </section>

    <!-- APP SECTION -->
    <main id="app-section" style="display:none">
        <div class="app-header">
            <span id="user-greeting"></span>
            <button id="btn-logout" class="btn-logout">Sair</button>
        </div>

        <section class="card" aria-labelledby="calc-title">
            <h1 id="calc-title" class="visually-hidden txt-center">
                Formulário de Despesas Mensais
            </h1>

            <div class="card-body">
                <div class="form-group">
                    <label for="salario">Salário Base (Kz)</label>
                    <input type="number" id="salario" min="0" />
                </div>
                <div class="form-group">
                    <label for="currency">Moeda <span class="beta-tag">(BETA)</span></label>
                    <select id="currency" disabled>
                        <option value="">Escolha a moeda</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição da Despesa</label>
                    <input type="text" id="descricao" placeholder="Ex: Dízimo" />
                </div>
                <div class="form-group">
                    <label for="valor">Valor da Despesa (Kz)</label>
                    <input type="number" id="valor" placeholder="Ex: 10000" min="0" />
                </div>

                <button id="btn-adicionar" type="button">Adicionar Despesa</button>
            </div>


            <div class="table-wrapper">
                <table aria-label="Lista de Despesas">
                    <thead>
                        <tr>
                            <th class="txt-center">#</th>
                            <th class="txt-center">Descrição</th>
                            <th class="txt-center">Valor (Kz)</th>
                            <th class="txt-center">Percentagem</th>
                            <th class="txt-center action">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela"></tbody>
                    <tfoot id="resumo"></tfoot>
                </table>
            </div>
        </section>
    </main>

    <script src="assests/js/script.js"></script>
</body>

</html>
